# ---------------------------
# Paths
# ---------------------------
paths:
  raw_data_folder: "data/raw"
  processed_data_folder: "data/processed"
  model_dir: "models"
  results_folder: "results"

# ---------------------------
# Data Generation / Dummy Data
# ---------------------------
dummy_data:
  n_runs: 120
  random_seed: 42

# ---------------------------
# Preprocessing
# ---------------------------
preprocessing:
  drop_na_columns:
    - distance_km
  normalize_columns:
    - distance_km
    - avg_pace_min_km
    - effort_score

# ---------------------------
# Feature Engineering
# ---------------------------
features:
  rolling_load_window: 7        # Number of recent runs for cumulative load
  atl_halflife_days: 7          # Acute Training Load half-life (fatigue)
  ctl_halflife_days: 42         # Chronic Training Load half-life (fitness)

# ---------------------------
# Modelling
# ---------------------------
modelling:
  target_hr: avg_hr
  target_pace: avg_pace_min_km
  model_type: gradient_boosting   # model used for final training and dashboard
  compare_models:                 # models compared during the CV step
    - linear
    - ridge
    - random_forest
    - gradient_boosting
  test_size: 0.2
  random_state: 42

# ---------------------------
# Evaluation
# ---------------------------
evaluation:
  cv_folds: 5
  metrics:
    - MAE
    - RMSE
    - R2

# ---------------------------
# Race Prediction
# ---------------------------
race_prediction:
  distances_km:
    5k: 5.0
    10k: 10.0
    half_marathon: 21.097
    marathon: 42.195

# ---------------------------
# Visualization
# ---------------------------
visualization:
  show_plots: false
  save_plots: true
  figsize: [7, 4]
